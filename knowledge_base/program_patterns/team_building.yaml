programme_type: Team Building

version: 1.0

purpose: >
  Develop stronger collaboration through a progressive experiential journey.

learning_journey:

  - Arrival

  - Connection

  - Trust

  - Communication

  - Planning

  - Collaboration

  - Commitment

  - Closing

design_rules:

  - Every programme starts by connecting people.

  - Trust must come before communication.

  - Communication must come before planning.

  - Planning must come before collaboration.

  - Collaboration is the primary outcome.

  - Team Building does not end with Innovation.

success_indicator:

  Participants leave with stronger collaboration than when they arrived.