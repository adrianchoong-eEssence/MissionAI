<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f8fafc;
      background: transparent;
    }
    .card {
      padding: 16px;
      border: 1px solid rgba(148, 163, 184, .34);
      border-radius: 14px;
      background: #111827;
    }
    .status { font-weight: 750; margin-bottom: 6px; }
    .detail { color: #cbd5e1; font-size: 14px; line-height: 1.45; }
    .actions { display: flex; gap: 10px; margin-top: 14px; }
    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 15px;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
    }
    #start { background: #22c55e; color: #052e16; flex: 1; }
    #stop { background: #334155; color: #f8fafc; }
    button:disabled { opacity: .5; cursor: default; }
    .warning { margin-top: 12px; color: #facc15; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <div id="status" class="status">GPS is stopped</div>
    <div id="detail" class="detail">Start GPS when your team begins the Road Hunt.</div>
    <div class="actions">
      <button id="start">Start Navigator GPS</button>
      <button id="stop" disabled>Stop</button>
    </div>
    <div class="warning">Keep EXOS open, the screen awake, and the navigator phone charging.</div>
  </div>

  <script>
    let watchId = null;
    let intervalMs = 20000;
    let lastSentAt = 0;
    let sequence = 0;

    const statusEl = document.getElementById("status");
    const detailEl = document.getElementById("detail");
    const startButton = document.getElementById("start");
    const stopButton = document.getElementById("stop");

    function post(type, extra) {
      window.parent.postMessage(Object.assign({
        isStreamlitMessage: true,
        type: type
      }, extra || {}), "*");
    }

    function setHeight() {
      post("streamlit:setFrameHeight", { height: document.body.scrollHeight });
    }

    function setValue(value) {
      post("streamlit:setComponentValue", { value: value, dataType: "json" });
    }

    function updateButtons(running) {
      startButton.disabled = running;
      stopButton.disabled = !running;
    }

    function stopWatch(message) {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      updateButtons(false);
      statusEl.textContent = message || "GPS is stopped";
      detailEl.textContent = "No new team locations are being sent.";
      setHeight();
    }

    function gpsError(error) {
      const messages = {
        1: "Location permission was denied. Allow location access in the browser and try again.",
        2: "The phone could not determine its location. Move into an open area and try again.",
        3: "Location timed out. Check GPS and mobile data, then try again."
      };
      stopWatch("GPS needs attention");
      detailEl.textContent = messages[error.code] || error.message || "Location could not be read.";
      setHeight();
    }

    function gpsPosition(position) {
      const now = Date.now();
      statusEl.textContent = "GPS active";
      detailEl.textContent = "Accuracy: ±" + Math.round(position.coords.accuracy || 0) +
        " m · last reading " + new Date(position.timestamp).toLocaleTimeString();

      if (lastSentAt && now - lastSentAt < intervalMs) {
        setHeight();
        return;
      }

      lastSentAt = now;
      sequence += 1;
      setValue({
        sequence: sequence,
        latitude: position.coords.latitude,
        longitude: position.coords.longitude,
        accuracy_meters: position.coords.accuracy,
        heading_degrees: position.coords.heading,
        speed_mps: position.coords.speed,
        captured_at: new Date(position.timestamp).toISOString()
      });
      setHeight();
    }

    function startWatch() {
      if (!navigator.geolocation) {
        statusEl.textContent = "GPS unavailable";
        detailEl.textContent = "This browser does not support location tracking.";
        return;
      }
      if (watchId !== null) return;

      statusEl.textContent = "Requesting location permission…";
      detailEl.textContent = "Choose Allow when your browser asks for location access.";
      updateButtons(true);
      watchId = navigator.geolocation.watchPosition(
        gpsPosition,
        gpsError,
        {
          enableHighAccuracy: true,
          maximumAge: 5000,
          timeout: 20000
        }
      );
      setHeight();
    }

    startButton.addEventListener("click", startWatch);
    stopButton.addEventListener("click", () => stopWatch("GPS stopped by navigator"));

    window.addEventListener("message", function(event) {
      const message = event.data || {};
      if (message.type !== "streamlit:render") return;
      const seconds = Number((message.args || {}).interval_seconds || 20);
      intervalMs = Math.max(10, Math.min(seconds, 120)) * 1000;
      setHeight();
    });

    post("streamlit:componentReady", { apiVersion: 1 });
    setHeight();
  </script>
</body>
</html>
